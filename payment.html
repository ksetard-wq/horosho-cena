<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата заказа | Forward</title>
    <style>
        body {
            font-family: 'Roboto', -apple-system, system-ui, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .forward-pay-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 24px; /* Более мягкое скругление */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .payment-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .payment-header h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: #222;
        }

        #display-amount {
            font-size: 18px;
            color: #69c300; /* Ваш фирменный зеленый */
            font-weight: 700;
            margin: 0;
            background: #f0f9eb;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Единый блок карты */
        .card-box {
            background: #ffffff;
            border: 2px solid #edf2f7;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: border-color 0.3s ease;
        }

        .card-box:focus-within {
            border-color: #69c300;
        }

        .input-wrapper {
            padding: 15px 20px;
            border-bottom: 1px solid #edf2f7;
        }

        .input-wrapper label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .input-wrapper input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 18px;
            color: #2d3748;
            padding: 0;
            outline: none;
            font-weight: 500;
        }

        .row {
            display: flex;
        }

        .row .input-wrapper {
            flex: 1;
            border-bottom: none;
        }

        .row .input-wrapper:first-child {
            border-right: 1px solid #edf2f7;
        }

        /* Кнопка в стиле Forward */
        .btn-pay {
            width: 100%;
            background-color: #69c300;
            color: #ffffff;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(105, 195, 0, 0.2);
        }

        .btn-pay:hover {
            background-color: #5bb000;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(105, 195, 0, 0.3);
        }

        .btn-pay:active {
            transform: translateY(0);
        }

        .secure-note {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            font-size: 13px;
            color: #a0aec0;
        }

        .secure-note svg {
            fill: #69c300;
        }
    </style>
</head>
<body>

<div class="forward-pay-container">
    <div class="payment-header">
        <h1>Оплата заказа</h1>
        <p id="display-amount">0₽</p>
    </div>

    <div class="card-box">
        <div class="input-wrapper">
            <label>Номер банковской карты</label>
            <input type="text" id="card_num" placeholder="0000 0000 0000 0000">
        </div>
        <div class="row">
            <div class="input-wrapper">
                <label>Срок действия</label>
                <input type="text" id="card_date" placeholder="ММ/ГГ">
            </div>
            <div class="input-wrapper">
                <label>CVC / CVV</label>
                <input type="password" id="card_cvv" placeholder="•••">
            </div>
        </div>
    </div>

    <button class="btn-pay" onclick="confirmPayment()">Подтвердить и оплатить</button>

    <div class="secure-note">
        <svg width="14" height="14" viewBox="0 0 24 24"><path d="M18 10v-4c0-3.313-2.687-6-6-6s-6 2.687-6 6v4h-3v14h18v-14h-3zm-10 0v-4c0-2.206 1.794-4 4-4s4 1.794 4 4v4h-8z"/></svg>
        Безопасная оплата через шлюз Forward
    </div>
</div>

<script src="https://unpkg.com/imask"></script>
<script>
    // Инициализация масок
    IMask(document.getElementById('card_num'), { mask: '0000 0000 0000 0000' });
    IMask(document.getElementById('card_date'), { mask: '00/00' });
    IMask(document.getElementById('card_cvv'), { mask: '000' });

    // Загрузка данных заказа
    const orderData = JSON.parse(sessionStorage.getItem('current_pending_order'));
    if(orderData) {
        document.getElementById('display-amount').innerText = orderData.amount;
    }

    function confirmPayment() {
        const num = document.getElementById('card_num').value;
        const date = document.getElementById('card_date').value;
        const cvv = document.getElementById('card_cvv').value;

        if(num.length < 19 || date.length < 5 || cvv.length < 3) {
            alert("Пожалуйста, заполните все данные карты корректно");
            return;
        }

        // 1. Сохраняем в историю
        let history = JSON.parse(localStorage.getItem('my_orders')) || [];
        history.unshift(orderData);
        localStorage.setItem('my_orders', JSON.stringify(history));

        // 2. Очищаем корзину
        localStorage.removeItem('user_cart');
        localStorage.removeItem('applied_discount');

        // 3. Переход на страницу успеха
        window.location.href = 'success.html';
    }
</script>
</body>
</html>
