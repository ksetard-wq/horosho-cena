<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой Профиль — Одна Цена</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <link rel="stylesheet" href="css/s1.css">

  <style>
    /* --- ВСТРОЕННЫЕ СТИЛИ ДЛЯ ПРОФИЛЯ (чтобы точно красиво работало) --- */
    :root {
      --brand-green: #76e12e;
      --dark-bg: #222;
      --text-color: #333;
      --light-gray: #f5f5f5;
      --border-color: #eee;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background-color: var(--light-gray);
      color: var(--text-color);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Хлебные крошки */
    .breadcrumbs {
      font-size: 14px;
      margin-bottom: 20px;
      color: #888;
    }
    .breadcrumbs a {
      color: var(--brand-green);
      text-decoration: none;
    }
    .breadcrumbs .sep { margin: 0 5px; }

    /* Основной контейнер профиля */
    .profile-wrapper {
      display: flex;
      gap: 30px;
      margin-top: 20px;
    }

    /* Боковая панель */
    .profile-sidebar {
      flex: 0 0 280px;
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      height: fit-content;
    }

    .user-info-side {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .avatar-circle {
      width: 80px;
      height: 80px;
      background-color: var(--brand-green);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      margin: 0 auto 15px;
      text-transform: uppercase;
    }

    .user-name-side {
      margin: 0 0 5px;
      font-size: 18px;
      font-weight: 700;
    }

    .user-email-side {
      margin: 0;
      color: #888;
      font-size: 14px;
    }

    .profile-nav button {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: none;
      border: none;
      padding: 12px 15px;
      text-align: left;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
      color: var(--text-color);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .profile-nav button i {
      width: 20px;
      text-align: center;
      font-size: 16px;
      color: #aaa;
    }

    .profile-nav button:hover {
      background-color: #f0fff0;
    }

    .profile-nav button.active {
      background-color: var(--brand-green);
      color: #fff;
    }

    .profile-nav button.active i {
      color: #fff;
    }

    .profile-nav button.logout-btn {
      margin-top: 20px;
      color: #ff4d4d;
    }
    .profile-nav button.logout-btn i { color: #ff4d4d; }
    .profile-nav button.logout-btn:hover { background-color: #fff0f0; }

    /* Контентная область */
    .profile-content {
      flex: 1;
    }

    .profile-tab {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      display: none; /* Скрыты по дефолту */
    }

    .profile-tab.active {
      display: block; /* Показываем активную */
    }

    .profile-tab h2 {
      margin-top: 0;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--brand-green);
      display: inline-block;
      padding-bottom: 5px;
    }

    /* Форма профиля */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box; /* Важно! */
    }

    .form-group input:focus {
      border-color: var(--brand-green);
      outline: none;
      box-shadow: 0 0 0 3px rgba(118, 225, 46, 0.1);
    }

    .form-group input[readonly] {
      background-color: #f9f9f9;
      color: #888;
      cursor: not-allowed;
    }

    .save-btn {
      background-color: var(--brand-green);
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .save-btn:hover {
      background-color: #65c924;
      transform: translateY(-2px);
    }

    /* Мои заказы (пример) */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .order-item {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-meta h4 { margin: 0 0 5px; }
    .order-meta p { margin: 0; color: #888; font-size: 14px; }
    .order-status {
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      text-transform: uppercase;
    }
    .status-delivered { background-color: #e6fffa; color: #38b2ac; }
    .status-processing { background-color: #fffaf0; color: #ed8936; }

  </style>
</head>
<body>

<div class="container">
  <nav class="breadcrumbs">
    <a href="index.html">Главная</a> <span class="sep">›</span> <span>Мой аккаунт</span>
  </nav>

  <div class="profile-wrapper">

    <aside class="profile-sidebar">
      <div class="user-info-side">
        <div class="avatar-circle" id="avatar-char">?</div>
        <h3 class="user-name-side" id="user-name-side">Загрузка...</h3>
        <p class="user-email-side" id="user-email-side">email@example.com</p>
      </div>

      <nav class="profile-nav">
        <button class="nav-link active" data-tab="personal">
          <i class="far fa-user"></i> Личные данные
        </button>
        <button class="nav-link" data-tab="orders">
          <i class="fas fa-box"></i> Мои заказы
        </button>
        <button class="nav-link" data-tab="wishlist">
          <i class="far fa-heart"></i> Избранное
        </button>
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
      </nav>
    </aside>

    <main class="profile-content">

      <section id="personal" class="profile-tab active">
        <h2>Личные данные</h2>
        <form class="profile-form" id="profile-edit-form">
          <div class="form-group">
            <label>ФИО</label>
            <input type="text" id="prof-name" value="" placeholder="Иванов Иван Иванович">
          </div>
          <div class="form-group">
            <label>Email адрес (нельзя изменить)</label>
            <input type="email" id="prof-email" value="" readonly>
          </div>
          <div class="form-group">
            <label>Адрес доставки</label>
            <input type="text" id="prof-address" placeholder="Город, улица, дом, квартира">
          </div>
          <button type="submit" class="save-btn">Сохранить изменения</button>
        </form>
      </section>

      <section id="orders" class="profile-tab">
        <h2>Мои заказы</h2>
        <div class="orders-list">
          <div class="order-item">
            <div class="order-meta">
              <h4>Заказ #12345</h4>
              <p>от 15.05.2023, 3 товара на сумму 2 500 ₽</p>
            </div>
            <span class="order-status status-delivered">Доставлен</span>
          </div>
          <div class="order-item">
            <div class="order-meta">
              <h4>Заказ #12348</h4>
              <p>от 20.05.2023, 1 товар на сумму 850 ₽</p>
            </div>
            <span class="order-status status-processing">В обработке</span>
          </div>
        </div>
      </section>

      <section id="wishlist" class="profile-tab">
        <h2>Избранное</h2>
        <p>Здесь будут ваши понравившиеся товары.</p>
      </section>

    </main>
  </div>
</div>

<script>
  // --- JAVASCRIPT ДЛЯ ПРОФИЛЯ ---

  document.addEventListener('DOMContentLoaded', function() {

    // 1. ПРОВЕРКА АВТОРИЗАЦИИ
    // Получаем данные текущего пользователя из localStorage
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    // Если пользователя нет, отправляем его на страницу логина
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    // 2. ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА ДАННЫМИ
    const nameField = document.getElementById('prof-name');
    const emailField = document.getElementById('prof-email');
    const addressField = document.getElementById('prof-address');

    const sideName = document.getElementById('user-name-side');
    const sideEmail = document.getElementById('user-email-side');
    const avatar = document.getElementById('avatar-char');

    // Заполняем форму и сайдбар
    nameField.value = currentUser.name || "";
    emailField.value = currentUser.email || "";
    addressField.value = currentUser.address || "";

    sideName.textContent = currentUser.name || "Пользователь";
    sideEmail.textContent = currentUser.email;

    // Берем первую букву имени для аватара
    if (currentUser.name) {
      avatar.textContent = currentUser.name.charAt(0).toUpperCase();
    }


    // 3. ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ВКЛАДОК (Tabs)
    const navLinks = document.querySelectorAll('.profile-nav .nav-link');
    const tabs = document.querySelectorAll('.profile-content .profile-tab');

    navLinks.forEach(link => {
      link.addEventListener('click', function() {
        // Убираем active у всех кнопок
        navLinks.forEach(l => l.classList.remove('active'));
        // Добавляем active нажатой
        this.classList.add('active');

        // Получаем ID вкладки из data-tab
        const tabId = this.getAttribute('data-tab');

        // Скрываем все вкладки
        tabs.forEach(tab => tab.classList.remove('active'));
        // Показываем нужную
        document.getElementById(tabId).classList.add('active');
      });
    });


    // 4. ЛОГИКА СОХРАНЕНИЯ ИЗМЕНЕНИЙ
    document.getElementById('profile-edit-form').addEventListener('submit', function(e) {
      e.preventDefault(); // Предотвращаем перезагрузку страницы

      // Получаем новые значения из полей
      const newName = nameField.value;
      const newAddress = addressField.value;

      // Обновляем объект текущего пользователя
      currentUser.name = newName;
      currentUser.address = newAddress;

      // --- ОБНОВЛЯЕМ ДАННЫЕ В LOCALSTORAGE ---

      // 1. Обновляем сессию "currentUser"
      localStorage.setItem('currentUser', JSON.stringify(currentUser));

      // 2. (Опционально) Обновляем пользователя в общем списке всех юзеров "allUsers"
      let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
      allUsers = allUsers.map(u => {
        // Находим юзера по email и заменяем его на обновленного
        if (u.email === currentUser.email) {
          return currentUser;
        }
        return u;
      });
      localStorage.setItem('allUsers', JSON.stringify(allUsers));

      // Визуальное обновление сайдбара
      sideName.textContent = newName;
      avatar.textContent = newName.charAt(0).toUpperCase();

      // Показываем уведомление
      alert('Данные успешно обновлены!');
    });
  });

  // Функция Выхода (Logout)
  function logout() {
    // Удаляем currentUser из LocalStorage, завершая сессию
    localStorage.removeItem('currentUser');
    // Перенаправляем на главную
    window.location.href = 'index.html';
  }

</script>

</body>
</html>
