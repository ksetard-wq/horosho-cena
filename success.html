<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link rel="stylesheet" hr>
</head>
<body>
<style>
  .success-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, sans-serif;
  }
  .checkmark {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: block;
    stroke-width: 2;
    stroke: #69c300;
    stroke-miterlimit: 10;
    box-shadow: inset 0px 0px 0px #69c300;
    animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s forwards;
  }
  .checkmark__circle {
    stroke-dasharray: 166;
    stroke-dashoffset: 166;
    stroke-width: 2;
    stroke-miterlimit: 10;
    stroke: #69c300;
    fill: none;
    animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
  }
  .checkmark__check {
    transform-origin: 50% 50%;
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
  }
  @keyframes stroke { 100% { stroke-dashoffset: 0; } }
  @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 50px transparent; } }

  h1 { font-size: 32px; font-weight: 600; margin: 20px 0 10px; }
  p { color: #86868b; font-size: 17px; }
</style>

<div class="success-page">
  <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
    <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
    <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
  </svg>
  <h1>Готово.</h1>
  <p>Заказ успешно добавлен в ваш профиль.</p>
  <a href="profile.html" style="margin-top: 30px; color: #0071e3; text-decoration: none;">Посмотреть мои заказы</a>
</div>
<script>
    setTimeout(function() {

        window.location.href = 'index.html';
    }, 3000);
</script>
</body>
</html>
